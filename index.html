<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gersa - Comprobante de Cita</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gersa-blue: #1c2c5c;
            --bg-ui: #f0f2f5;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-ui);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* --- UI FORMULARIO (INTERFAZ) --- */
        .card-ui {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        .logo-center { text-align: center; margin-bottom: 25px; }
        .logo-ui { max-width: 180px; height: auto; }

        h2.subtitle-ui {
            text-align: center;
            color: var(--gersa-blue);
            font-weight: 600;
            font-size: 1.1rem;
            margin: 0 0 35px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
            background: #fcfcfd;
        }

        .btn-generate {
            background: var(--gersa-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-generate:hover { opacity: 0.9; }

        /* --- DISEÑO PDF (ESTRUCTURA OCULTA) --- */
        #pdf-render {
            display: none;
            width: 794px; /* A4 */
            background: white;
            color: #1a1a1a;
        }

        .pdf-top-bar { height: 8px; background-color: var(--gersa-blue); width: 100%; }
        .pdf-content { padding: 60px 80px; }

        /* Encabezado en línea recta con letra pequeña */
        .pdf-header {
            display: flex;
            justify-content: space-between;
            align-items: center; /* Alineación a la par */
            margin-bottom: 60px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .pdf-logo { max-width: 170px; height: auto; }

        .pdf-title-text { text-align: right; margin: 0; }
        .pdf-title-single-line {
            font-size: 14px; /* Letra más pequeña */
            color: #2c3e50;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        .pdf-welcome { font-size: 15px; color: #444; margin-bottom: 40px; line-height: 1.6; }
        .pdf-welcome strong { color: var(--gersa-blue); font-weight: 600; }

        .pdf-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 40px 0;
            margin-bottom: 40px;
        }

        .pdf-label { font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
        .pdf-value { font-size: 17px; color: var(--gersa-blue); font-weight: 500; }

        .pdf-notes-section {
            background-color: #fcfcfd;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #f1f5f9;
        }

        .pdf-notes-text { font-size: 14px; color: #555; line-height: 1.6; margin: 0; }

        .pdf-footer {
            margin-top: 80px;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 25px;
            font-size: 10px;
            color: #ccc;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card-ui">
        <div class="logo-center">
            <img src="logo-azul.png" alt="GERSA" class="logo-ui">
        </div>
        <h2 class="subtitle-ui">Generar Comprobante</h2>

        <div class="field">
            <label>Nombre del Cliente</label>
            <input type="text" id="cliente" placeholder="Ej. Juan Pérez">
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="field" style="flex: 1;">
                <label>Fecha de Cita</label>
                <input type="date" id="fecha">
            </div>
            <div class="field" style="flex: 1;">
                <label>Hora</label>
                <input type="time" id="hora">
            </div>
        </div>

        <div class="field">
            <label>Vendedor / Atendido por</label>
            <input type="text" id="vendedor" placeholder="Nombre del responsable">
        </div>

        <div class="field">
            <label>Motivo de la Cita</label>
            <textarea id="motivo" rows="3" placeholder="Detalles de la visita..."></textarea>
        </div>

        <button class="btn-generate" onclick="descargarPDF()">DESCARGAR COMPROBANTE (PDF)</button>
    </div>

    <div id="pdf-render">
        <div class="pdf-top-bar"></div>
        <div class="pdf-content">
            <div class="pdf-header">
                <img src="logo-azul.png" alt="GERSA" class="pdf-logo">
                
                <div class="pdf-title-text">
                    <p class="pdf-title-single-line">Comprobante de Cita</p>
                </div>
            </div>

            <p class="pdf-welcome">Estimado(a) <strong><span id="out-cliente"></span></strong>,</p>
            <p class="pdf-welcome" style="margin-top: -30px;">Confirmamos los detalles de su próxima visita a nuestras instalaciones:</p>

            <div class="pdf-grid">
                <div>
                    <div class="pdf-label">Fecha Programada</div>
                    <div id="out-fecha" class="pdf-value"></div>
                </div>
                <div>
                    <div class="pdf-label">Hora de Atención</div>
                    <div id="out-hora" class="pdf-value"></div>
                </div>
                <div>
                    <div class="pdf-label">Vendedor Responsable</div>
                    <div id="out-vendedor" class="pdf-value" style="font-size: 15px;"></div>
                </div>
            </div>

            <div class="pdf-label" style="margin-bottom: 12px;">Notas de la cita</div>
            <div class="pdf-notes-section">
                <p id="out-motivo" class="pdf-notes-text"></p>
            </div>

            <div class="pdf-footer">
                Documento oficial de confirmación digital - <strong>GERSA</strong>.
            </div>
        </div>
    </div>

    <script>
        function descargarPDF() {
            const cliente = document.getElementById('cliente').value;
            if(!cliente) return alert("Por favor, ingresa el nombre del cliente.");

            // Llenar datos al PDF
            document.getElementById('out-cliente').innerText = cliente;
            document.getElementById('out-fecha').innerText = document.getElementById('fecha').value || "Pendiente";
            document.getElementById('out-hora').innerText = document.getElementById('hora').value || "Pendiente";
            document.getElementById('out-vendedor').innerText = document.getElementById('vendedor').value || "No especificado";
            document.getElementById('out-motivo').innerText = document.getElementById('motivo').value || "Visita comercial programada.";

            const element = document.getElementById('pdf-render');
            element.style.display = 'block';

            const opt = {
                margin: 0,
                filename: `Comprobante_Gersa_${cliente}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Pequeña espera para asegurar el renderizado
            setTimeout(() => {
                html2pdf().set(opt).from(element).save().then(() => {
                    element.style.display = 'none';
                });
            }, 400);
        }
    </script>
</body>
</html>
